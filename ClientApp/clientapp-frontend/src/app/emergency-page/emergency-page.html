<mat-card class="phone-wrapper">
  <mat-card-content class="phone">

    <div class="header" fxLayout="row" fxLayoutGap="16px" fxLayoutAlign="space-between start">
      <h1>Ersthelfer</h1>
      <div class="header-info">
        <p>
          <strong>Einsatzdauer:</strong>
          {{ formatTime(durationSeconds()) }}
        </p>
        <p class="location">
          <strong>Standort:</strong><br />
          {{ address() }}
        </p>
      </div>

      <mat-card class="camera-preview" appearance="outlined">
        <mat-card-content>
          <app-video-call></app-video-call>
        </mat-card-content>
      </mat-card>

    </div>
    <div class="action-bar" fxLayout="row" fxLayoutAlign="space-around center" fxLayoutGap="16px">
      <button mat-icon-button><mat-icon>flash_on</mat-icon></button>
      <button mat-icon-button><mat-icon>mic</mat-icon></button>
      <button mat-icon-button><mat-icon>camera_alt</mat-icon></button>
      <button mat-icon-button><mat-icon>undo</mat-icon></button>
    </div>

  </mat-card-content>
</mat-card>
