

<div style="display: flex; justify-content: center; align-items: center; gap: 3rem;"
  class="panic-button"
  (mousedown)="startHold()"
  (mouseup)="stopHold()"
  (mouseleave)="stopHold()"
  (touchstart)="startHold()"
  (touchend)="stopHold()">

  <h1>Rescue Guide Notfall </h1>

  <mat-progress-spinner
    diameter="220"
    mode="determinate"
    [value]="state.holdProgress()">
  </mat-progress-spinner>

  <p>2 Sekunden halten um Notfall zu starten</p>

  <div class="action-bar" fxLayout="row" fxLayoutAlign="space-around center" fxLayoutGap="16px" style="margin: 1rem;">
    <button mat-icon-button ><mat-icon>alarm</mat-icon></button>
    <button mat-icon-button routerLink="/fasthelp"><mat-icon>help_outline</mat-icon></button>
    <button mat-icon-button routerLink="/study"><mat-icon>book</mat-icon></button>
    <button mat-icon-button routerLink="/profile"><mat-icon>account_circle</mat-icon></button>
  </div>

</div>
