<div class="panic-container"
     (mousedown)="startHold()"
     (mouseup)="stopHold()"
     (mouseleave)="stopHold()"
     (touchstart)="startHold()"
     (touchend)="stopHold()">

  <header>
    <h1>Rescue Guide</h1>
    <span class="subtitle">Notfall-Assistent</span>
  </header>

  <!-- GPS-Widget eingebettet: zeigt Standort sofort auf der Startseite -->
  <!--<app-gps></app-gps>-->

  <div class="spinner-wrapper">
    <mat-progress-spinner
      diameter="220"
      strokeWidth="12"
      mode="determinate"
      [value]="state.holdProgress()">
    </mat-progress-spinner>

    <div class="emergency-icon" [class.is-holding]="state.holdProgress() > 0">
      <mat-icon>notifications_active</mat-icon>
    </div>
  </div>

  <div class="instruction">
    <p><strong>2 Sekunden halten</strong></p>
    <span>um den Notfall zu starten</span>
  </div>

</div>

<app-navbar></app-navbar>
