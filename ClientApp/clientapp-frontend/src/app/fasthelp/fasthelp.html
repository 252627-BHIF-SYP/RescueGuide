
@if (!selectedTopic()) {
  <mat-card class="home-screen">
    <mat-card-header>
      <mat-card-title>Erste Hilfe zuhause</mat-card-title>
    </mat-card-header>

    <mat-form-field appearance="outline" class="search-field">
      <input matInput [(ngModel)]="query" placeholder="Thema suchen" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-card-content class="topic-list">
      @for (topic of filteredTopics(); track topic.id) {
        <button mat-stroked-button class="topic-button" (click)="openTopic(topic.id)">
          {{ topic.title }}
        </button>
      }
    </mat-card-content>
  </mat-card>
}

@if (selectedTopic(); as topic) {
  <mat-card class="detail-screen">
    <mat-card-header>
      <button mat-icon-button (click)="goBack()"><mat-icon>arrow_back</mat-icon></button>
      <mat-card-title>{{ topic.title }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (topic.image) {
        <img [src]="topic.image" class="topic-image"  alt=""/>
      }
      <p>{{ topic.instructions }}</p>
      <button mat-raised-button color="warn" (click)="callEmergency()">Notfall/Rettung rufen</button>
    </mat-card-content>
  </mat-card>
}

<app-navbar></app-navbar>
