

<div class="gps-container">

  <div class="button-container">
    <button mat-raised-button color="primary" (click)="startGps()">
      Standort holen
    </button>
    <button mat-stroked-button color="warn" (click)="stopGps()">
      Stop
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <p>{{ status() }}</p>

      @if (latitude() !== null && longitude() !== null) {
        <mat-list>
          <mat-list-item>
            <strong>Latitude:</strong> {{ latitude() }}
          </mat-list-item>
          <mat-list-item>
            <strong>Longitude:</strong> {{ longitude() }}
          </mat-list-item>
          <mat-list-item>
            <strong>Accuracy:</strong> {{ accuracy() }} m
          </mat-list-item>
        </mat-list>
      } @else if (error() !== null) {
        <p class="error-message">
          Fehler: {{ error() }}
        </p>
      }
    </mat-card-content>
  </mat-card>

</div>
