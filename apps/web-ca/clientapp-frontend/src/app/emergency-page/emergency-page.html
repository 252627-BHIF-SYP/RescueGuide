<div class="emergency-container">
  <div class="emergency-content">
    <header>
      <h1>Ersthelfer</h1>
      <div class="emergency-info">
        <p><strong>Einsatzdauer:</strong> {{ formatTime(durationSeconds()) }}</p>
        <p class="location"><strong>Standort:</strong><br />{{ address() }}</p>
      </div>
    </header>

    <div class="video-section">
      <mat-card class="video-card" appearance="outlined">
        <mat-card-content>
          <app-video-call></app-video-call>

          <div class="controls-section">
            <div class="action-buttons">
              <button mat-icon-button aria-label="Blitzlicht">
                <mat-icon>flash_on</mat-icon>
              </button>
              <button mat-icon-button aria-label="Mikrofon">
                <mat-icon>mic</mat-icon>
              </button>
              <button mat-icon-button aria-label="Kamera">
                <mat-icon>camera_alt</mat-icon>
              </button>
              <button mat-icon-button aria-label="Rückgängig">
                <mat-icon>undo</mat-icon>
              </button>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
