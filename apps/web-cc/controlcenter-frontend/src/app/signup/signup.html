<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Registrieren</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="form-container">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput [(ngModel)]="username" placeholder="Dein Name" autocomplete="off">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Passwort</mat-label>
          <input matInput type="password" [(ngModel)]="password" (keyup.enter)="onSignup()">
        </mat-form-field>

        @if (error()) {
          <p class="error-message">{{ error() }}</p>
        }
      </div>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-raised-button color="primary" (click)="onSignup()">
        Registrieren
      </button>
      <button mat-button color="accent" (click)="goToLogin()">Schon Account? Login</button>
    </mat-card-actions>
  </mat-card>
</div>
