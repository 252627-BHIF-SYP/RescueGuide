services:
  db:
    image: postgres:15-alpine
    container_name: rescueguide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: RescueGuideDB
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - rescueguide-network

  backend:
    build:
      context: .
      dockerfile: ./src/RescueGuideDB.WebApp/Dockerfile
    container_name: RescueGuide-Backend
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=RescueGuideDB;Username=postgres;Password=postgres
    ports:
      - "5001:80"
    restart: always
    networks:
      - rescueguide-network

  signaling-server:
    build:
      context: ./webrtclogic
    container_name: rescue-signaling
    ports:
      - "3000:3000"
    restart: always
    networks:
      - rescueguide-network

  client-app:
    build:
      context: ./ClientApp/clientapp-frontend
    container_name: rescue-client
    ports:
      - "80:80"
    depends_on:
      - backend
      - signaling-server
    restart: always
    networks:
      - rescueguide-network

  control-center:
    build:
      context: ./ControlCenterApp/controlcenter-frontend
    container_name: rescue-control
    ports:
      - "81:80"
    depends_on:
      - backend
      - signaling-server
    restart: always
    networks:
      - rescueguide-network

volumes:
  db_data:

networks:
  rescueguide-network:
    driver: bridge