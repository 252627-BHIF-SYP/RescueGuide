name: rescueguide

services:
  # --- WebRTC Signaling Server ---
  webrtclogic:
    build:
      context: ./webrtclogic
      dockerfile: Dockerfile
    container_name: webrtc-logic
    ports:
      - "3000:3000"
    restart: unless-stopped

  # --- Control Center Backend ---
  cc-backend:
    build:
      context: .
      dockerfile: ControlCenterApp/controlcenter-backend/Dockerfile
    container_name: cc-backend
    ports:
      - "5062:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - rescueguide-backend

  # --- Client Backend ---
  client-backend:
    build:
      context: .
      dockerfile: ClientApp/clientapp-backend/Dockerfile
    container_name: client-backend
    ports:
      - "5273:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - rescueguide-backend

  # --- Control Center Frontend ---
  cc-frontend:
    build: ./ControlCenterApp/controlcenter-frontend
    container_name: cc-frontend
    ports:
      - "4200:80"
    depends_on:
      - cc-backend

  # --- Client Frontend ---
  client-frontend:
    build: ./ClientApp/clientapp-frontend
    container_name: client-frontend
    ports:
      - "4201:80"
    depends_on:
      - client-backend