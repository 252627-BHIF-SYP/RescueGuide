services:
  # --- Control Center App ---

  webrtclogic:
    build:
      context: ./webrtclogic
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  cc-backend:
    build: ./controlcenterapp/controlcenter-backend
    container_name: cc-backend
    ports:
      - "5062:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  cc-frontend:
    build: ./controlcenterapp/controlcenter-frontend
    container_name: cc-frontend
    ports:
      - "4200:80"  
    depends_on:
      - cc-backend

  # --- Client App ---
  client-backend:
    build: ./clientapp/clientapp-backend
    container_name: client-backend
    ports:
      - "5273:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  client-frontend:
    build: ./clientapp/clientapp-frontend
    container_name: client-frontend
    ports:
      - "4201:80"
    depends_on:
      - client-backend

networks:
  default:
    name: rescueguide-network