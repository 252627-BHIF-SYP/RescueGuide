name: rescueguide

services:
  # --- WebRTC Signaling Server ---
  webrtclogic:
    build:
      context: ./webrtclogic
      dockerfile: Dockerfile
    container_name: webrtc-logic
    ports:
      - "3000:3000"
    restart: unless-stopped

  # --- Control Center Frontend ---
  cc-frontend:
    build: ./ControlCenterApp/controlcenter-frontend
    container_name: cc-frontend
    ports:
      - "4200:80"
    depends_on:
      - cc-backend

  # --- Client Frontend ---
  client-frontend:
    build: ./ClientApp/clientapp-frontend
    container_name: client-frontend
    ports:
      - "4201:80"
    depends_on:
      - client-backend