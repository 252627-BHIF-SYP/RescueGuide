services:
  # 🗄️ PostgreSQL Datenbank
  db:
    image: postgres:15-alpine
    container_name: rescueguide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: RescueGuideDB
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  # ⚙️ .NET Backend
  backend:
    build:
      context: .
      dockerfile: ./src/RescueGuideDB.WebApp/Dockerfile
    container_name: rescueguide-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=RescueGuideDB;Username=postgres;Password=postgres
    ports:
      - "5238:80"


  client-app:
    build:
      context: ./clientapp/clientapp-frontend
    container_name: rescue-client
    ports:
      - "80:80"

  control-center:
    build:
      context: ./controlcenterapp/controlcenter-frontend
    container_name: rescue-control
    ports:
      - "81:80"

  signaling-server:
    build:
      context: ./webrtclogic
    container_name: rescue-signaling
    ports:
      - "3000:3000"

volumes:
  db_data: