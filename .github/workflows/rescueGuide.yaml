name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: rescueguide-backend
            context: .
            dockerfile: ./RescueGuideDB.WebApp/Dockerfile
          - image_name: cc-backend
            context: ./ControlCenterApp/controlcenter-backend
            dockerfile: ./ControlCenterApp/controlcenter-backend/Dockerfile
          - image_name: cc-frontend
            context: ./ControlCenterApp/controlcenter-frontend
            dockerfile: ./ControlCenterApp/controlcenter-frontend/Dockerfile
          - image_name: client-backend
            context: ./ClientApp/clientapp-backend
            dockerfile: ./ClientApp/clientapp-backend/Dockerfile
          - image_name: client-frontend
            context: ./ClientApp/clientapp-frontend
            dockerfile: ./ClientApp/clientapp-frontend/Dockerfile
          - image_name: webrtc-logic
            context: ./webrtclogic
            dockerfile: ./webrtclogic/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.rescueGuideGhcrLogin }}

      - name: Lowercase Registry Path
        id: prep
        run: |
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          echo "image_base=ghcr.io/${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.prep.outputs.image_base }}/${{ matrix.image_name }}:latest
