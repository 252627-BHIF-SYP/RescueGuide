name: Build and Push Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.rescueGuideGhcrLogin }}

      # Build & Push Client App
      - name: Build and push Client App
        uses: docker/build-push-action@v5
        with:
          context: ./ClientApp/clientapp-frontend
          push: true
          tags: ghcr.io/252627-bhif-syp/rescueguide-client:latest

      # Build & Push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/RescueGuideDB.WebApp/Dockerfile
          push: true
          tags: ghcr.io/252627-bhif-syp/rescueguide-backend:latest
      
      # Build & Push Control Center
      - name: Build and push Control Center
        uses: docker/build-push-action@v5
        with:
          context: ./ControlCenterApp/controlcenter-frontend
          push: true
          tags: ghcr.io/252627-bhif-syp/rescueguide-controlcenter:latest

      # Build & Push Signaling Server
      - name: Build and push Signaling Server
        uses: docker/build-push-action@v5
        with:
          context: ./webrtclogic
          push: true
          tags: ghcr.io/252627-bhif-syp/rescueguide-signaling:latest
