<div class="accept-call-container">
  <mat-card class="call-card">
    <div class="call-content">
      <mat-icon class="emergency-icon">emergency</mat-icon>

      <h2>Notruf</h2>
      <p>Notruf annehmen?</p>

      <div class="button-group">
        <button mat-raised-button
                color="warn"
                class="reject-btn"
                (click)="rejectCall()">
          <mat-icon>close</mat-icon>
          Nein
        </button>

        <button mat-raised-button
                color="primary"
                class="accept-btn"
                (click)="acceptCall()">
          <mat-icon>check</mat-icon>
          Ja
        </button>
      </div>
    </div>
  </mat-card>
</div>
